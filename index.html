<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Crypto Top 50 Dashboard</title>
    <style>
        body { background: #131722; color: #d1d4dc; font-family: sans-serif; padding: 20px; }
        .control-panel { background: #1c2230; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; width: 350px; cursor: pointer; }
        .summary-box { background: #1c2230; padding: 20px; border-radius: 12px; border: 1px solid #ffcc00; margin-bottom: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .box { background: #1c2230; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .status-bar { margin-top: 10px; padding: 10px; background: #0b0e14; border-radius: 6px; font-size: 0.85em; border-left: 4px solid #444; }
    </style>
</head>
<body>

<div class="control-panel">
    <h1>Crypto Top 50 Dashboard</h1>
    <select id="coinSelect" onchange="updateDashboard()"></select>
</div>

<div class="summary-box">
    <h2>Analyse per tijdsframe</h2>
    <p><b>Korte Termijn:</b> <span id="st"></span> | <b>Middellange Termijn:</b> <span id="mt"></span> | <b>Lange Termijn:</b> <span id="lt"></span></p>
</div>

<div class="dashboard" id="main-grid"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

    const configs = [
        {name: 'RSI (Momentum)', study: 'RSI@tv-basicstudies', desc: 'Boven 70 = overbought, onder 30 = oversold.'},
        {name: 'SMA/EMA (Trend)', study: 'MAExp@tv-basicstudies', desc: 'Prijs boven 200 EMA is lange termijn trend-bevestiging.'},
        {name: 'MACD (Omslag)', study: 'MACD@tv-basicstudies', desc: 'Kruisingen van de lijnen duiden op trendomslagen.'},
        {name: 'Volume (Bevestiging)', study: 'Volume@tv-basicstudies', desc: 'Hoge volumes bij prijsactie bevestigen de richting.'},
        {name: 'VWAP (Fair Price)', study: 'VWAP@tv-basicstudies', desc: 'Prijs t.o.v. VWAP geeft intraday fair price aan.'},
        {name: 'Sentiment', study: null, desc: 'Algemene marktstabiliteit op basis van futures.'}
    ];

    const select = document.getElementById('coinSelect');
    coins.forEach((c, index) => {
        let opt = document.createElement('option');
        opt.value = index;
        opt.innerHTML = c.name;
        select.appendChild(opt);
    });

    function updateDashboard() {
        const coin = coins[select.value];
        document.getElementById('st').innerHTML = coin.st;
        document.getElementById('mt').innerHTML = coin.mt;
        document.getElementById('lt').innerHTML = coin.lt;

        const grid = document.getElementById('main-grid');
        grid.innerHTML = ''; 

        configs.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'box';
            div.id = 'chart-' + i;
            grid.appendChild(div);
            new TradingView.widget({
                "container_id": div.id, "width": "100%", "height": 300,
                "symbol": coin.sym, "interval": "W", "theme": "dark", "range": "all",
                "studies": c.study ? [c.study] : [], "allow_symbol_change": false
            });
            const desc = document.createElement('div');
            desc.className = 'status-bar';
            desc.innerHTML = `<b>${c.name}:</b> ${c.desc}`;
            div.appendChild(desc);
        });
    }

    updateDashboard();
</script>
</body>
</html>

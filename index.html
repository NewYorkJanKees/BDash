<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Crypto Analyse Dashboard</title>
    <style>
        body { background: #131722; color: #d1d4dc; font-family: sans-serif; padding: 20px; }
        .control-panel { background: #1c2230; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; width: 350px; cursor: pointer; }
        .disclaimer { background: #4a1d1d; color: #ffcccc; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #ff4444; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .box { background: #1c2230; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .status-bar { margin-top: 10px; padding: 10px; background: #0b0e14; border-radius: 6px; font-size: 0.85em; border-left: 4px solid #444; }
    </style>
</head>
<body>

<div class="control-panel">
    <h1>Crypto Analyse Dashboard</h1>
    <div class="disclaimer">
        <strong>WAARSCHUWING:</strong> Dit dashboard toont live marktdata. Er zijn GEEN automatische koop/verkoop signalen. 
        De gebruiker is volledig zelf verantwoordelijk voor eigen technische analyse.
    </div>
    <select id="coinSelect" onchange="updateDashboard()"></select>
</div>

<div class="dashboard" id="main-grid"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const coins = [
        {name: "Bitcoin (BTC)", sym: "COINBASE:BTCEUR"},
        {name: "Ethereum (ETH)", sym: "COINBASE:ETHEUR"},
        {name: "Bitcoin Cash (BCH)", sym: "KRAKEN:BCHEUR"},
        {name: "Solana (SOL)", sym: "BINANCE:SOLUSDT"},
        {name: "Ripple (XRP)", sym: "BINANCE:XRPUSDT"},
        {name: "Cardano (ADA)", sym: "BINANCE:ADAUSDT"},
        {name: "Dogecoin (DOGE)", sym: "BINANCE:DOGEUSDT"},
        {name: "Avalanche (AVAX)", sym: "BINANCE:AVAXUSDT"},
        {name: "Polkadot (DOT)", sym: "BINANCE:DOTUSDT"},
        {name: "Tron (TRX)", sym: "BINANCE:TRXUSDT"},
        {name: "Chainlink (LINK)", sym: "BINANCE:LINKUSDT"},
        {name: "Polygon (MATIC)", sym: "BINANCE:MATICUSDT"},
        {name: "Litecoin (LTC)", sym: "COINBASE:LTCEUR"},
        {name: "Shiba Inu (SHIB)", sym: "BINANCE:SHIBUSDT"},
        {name: "Dai (DAI)", sym: "BINANCE:DAIUSDT"},
        {name: "Uniswap (UNI)", sym: "BINANCE:UNIUSDT"},
        {name: "Cosmos (ATOM)", sym: "BINANCE:ATOMUSDT"},
        {name: "Filecoin (FIL)", sym: "BINANCE:FILUSDT"},
        {name: "Near Protocol (NEAR)", sym: "BINANCE:NEARUSDT"},
        {name: "Aptos (APT)", sym: "BINANCE:APTUSDT"},
        {name: "Ethereum Classic (ETC)", sym: "BINANCE:ETCUSDT"},
        {name: "Stellar (XLM)", sym: "BINANCE:XLMUSDT"},
        {name: "Optimism (OP)", sym: "BINANCE:OPUSDT"},
        {name: "Arbitrum (ARB)", sym: "BINANCE:ARBUSDT"},
        {name: "Render (RNDR)", sym: "BINANCE:RNDRUSDT"},
        {name: "Pepe (PEPE)", sym: "BINANCE:PEPEUSDT"},
        {name: "Hedera (HBAR)", sym: "BINANCE:HBARUSDT"},
        {name: "Internet Computer (ICP)", sym: "BINANCE:ICPUSDT"},
        {name: "Theta Network (THETA)", sym: "BINANCE:THETAUSDT"},
        {name: "VeChain (VET)", sym: "BINANCE:VETUSDT"},
        {name: "Monero (XMR)", sym: "KRAKEN:XMREUR"},
        {name: "Algorand (ALGO)", sym: "BINANCE:ALGOUSDT"},
        {name: "The Graph (GRT)", sym: "BINANCE:GRTUSDT"},
        {name: "Fantom (FTM)", sym: "BINANCE:FTMUSDT"},
        {name: "Sandbox (SAND)", sym: "BINANCE:SANDUSDT"},
        {name: "Decentraland (MANA)", sym: "BINANCE:MANAUSDT"},
        {name: "Aave (AAVE)", sym: "BINANCE:AAVEUSDT"},
        {name: "Maker (MKR)", sym: "BINANCE:MKRUSDT"},
        {name: "Bitget Token (BGB)", sym: "MEXC:BGBUSDT"},
        {name: "Tezos (XTZ)", sym: "BINANCE:XTZUSDT"},
        {name: "EOS (EOS)", sym: "BINANCE:EOSUSDT"},
        {name: "Neo (NEO)", sym: "BINANCE:NEOUSDT"},
        {name: "Klaytn (KLAY)", sym: "BINANCE:KLAYUSDT"},
        {name: "Flow (FLOW)", sym: "BINANCE:FLOWUSDT"},
        {name: "Quant (QNT)", sym: "BINANCE:QNTUSDT"},
        {name: "Dash (DASH)", sym: "BINANCE:DASHUSDT"},
        {name: "Zcash (ZEC)", sym: "BINANCE:ZECUSDT"},
        {name: "Axie Infinity (AXS)", sym: "BINANCE:AXSUSDT"},
        {name: "IOTA (MIOTA)", sym: "BINANCE:IOTAUSDT"},
        {name: "Chiliz (CHZ)", sym: "BINANCE:CHZUSDT"}
    ];

    const configs = [
        {name: 'RSI (Momentum)', study: 'RSI@tv-basicstudies', desc: 'Indicator voor momentum.'},
        {name: 'SMA/EMA (Trend)', study: 'MAExp@tv-basicstudies', desc: 'Trendlijnen voor koersrichting.'},
        {name: 'MACD (Omslag)', study: 'MACD@tv-basicstudies', desc: 'Indicator voor trendomslag.'},
        {name: 'Volume (Bevestiging)', study: 'Volume@tv-basicstudies', desc: 'Volume ter bevestiging van prijs.'},
        {name: 'VWAP (Fair Price)', study: 'VWAP@tv-basicstudies', desc: 'Volume gewogen gemiddelde koers.'},
        {name: 'Candlesticks', study: null, desc: 'Live prijsactie (gebruik eigen analyse).'}
    ];

    const select = document.getElementById('coinSelect');
    coins.forEach((c, index) => {
        let opt = document.createElement('option');
        opt.value = index;
        opt.innerHTML = c.name;
        select.appendChild(opt);
    });

    function updateDashboard() {
        const coin = coins[select.value];
        const grid = document.getElementById('main-grid');
        grid.innerHTML = ''; 

        configs.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'box';
            div.id = 'chart-' + i;
            grid.appendChild(div);
            new TradingView.widget({
                "container_id": div.id, "width": "100%", "height": 300,
                "symbol": coin.sym, "interval": "W", "theme": "dark", "range": "all",
                "studies": c.study ? [c.study] : [], "allow_symbol_change": false
            });
            const desc = document.createElement('div');
            desc.className = 'status-bar';
            desc.innerHTML = `<b>${c.name} - ${c.name}:</b> ${c.desc}`;
            div.appendChild(desc);
        });
    }

    updateDashboard();
</script>
</body>
</html>
